name: MealFlow
options:
  bundleIdPrefix: com.bradleyyoung
  deploymentTarget:
    iOS: "17.0"
configs:
  Debug: debug
  Release: release
targets:
  MealFlow:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - MealFlowApp
      - MealFlowDomain/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bradleyyoung.mealflow
        PRODUCT_NAME: MealFlow
        SWIFT_VERSION: 5.10
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        INFOPLIST_FILE: MealFlowApp/Info.plist
        GENERATE_INFOPLIST_FILE: NO
    scheme:
      testTargets: []
  MealFlowWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - MealFlowWidgets
      - MealFlowDomain/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bradleyyoung.mealflow.widgets
        PRODUCT_NAME: MealFlowWidgets
        SWIFT_VERSION: 5.10
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        INFOPLIST_FILE: MealFlowWidgets/Info.plist
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - target: MealFlow
